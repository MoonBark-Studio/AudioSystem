# MoonBark Telemetry Configuration
# Loaded from YAML by TelemetryConfigurationLoader.
# Games can override this path in their bootstrap.

toggle_key: "F3"
history_size: 60
critical_threshold_ms: 4.0
auto_show_on_critical: true
panel_offset_x: 10
panel_offset_y: 10
panel_width: 400

stats:
  - id: fps
    display_name: "FPS"
    category: performance
    show_in_panel: true
    dev_only: false
    value_format: "{0:F0}"

  - id: frames_per_second
    display_name: "Frames Per Second"
    category: performance
    show_in_panel: true
    dev_only: true
    value_format: "{0:F1}"

  - id: coins_per_tick
    display_name: "Coins/Tick"
    category: economy
    show_in_panel: true
    dev_only: false
    value_format: "${0:N1}"

  - id: food_balance
    display_name: "Food Balance"
    category: economy
    show_in_panel: true
    dev_only: false
    value_format: "{0:F0}"

  - id: entity_count
    display_name: "Entities"
    category: simulation
    show_in_panel: true
    dev_only: true
    value_format: "{0:N0}"

  - id: component_count
    display_name: "Components"
    category: simulation
    show_in_panel: true
    dev_only: true
    value_format: "{0:N0}"

  - id: gc_gen0
    display_name: "GC Gen-0"
    category: performance
    show_in_panel: true
    dev_only: true
    value_format: "{0:N0}"

  - id: tick_count
    display_name: "Tick Count"
    category: simulation
    show_in_panel: false
    dev_only: true
    value_format: "{0:N0}"
